{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Clubes - LHABA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --lhaba-red: #D0282A;
      --bg-dark: #0D0D0F;
      --bg-card: #161618;
      --bg-card-hover: #1E1E22;
      --border-subtle: rgba(255,255,255,0.07);
    }

    body {
      background-color: var(--bg-dark);
      font-family: 'Barlow', sans-serif;
      color: #E0E0E0;
      margin: 0;
    }

    /* HEADER */
    .page-header {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 2.8rem;
      text-transform: uppercase;
      color: #fff;
    }

    .page-subtitle {
      color: #777;
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* TABLE CONTAINER */
    .table-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      border-bottom: 1px solid var(--border-subtle);
    }

    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      padding-bottom: 0.75rem;
    }

    tbody tr {
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.2s;
    }

    tbody tr:hover {
      background-color: var(--bg-card-hover);
    }

    tbody td {
      padding: 0.85rem 0;
      font-size: 0.9rem;
      color: #ccc;
    }

    .club-name {
      font-weight: 600;
      color: #fff;
    }

    /* BOTÓN VOLVER */
    .back-btn {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ccc;
      text-decoration: none;
      border: 1px solid var(--border-subtle);
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #fff;
      border-color: var(--lhaba-red);
      background-color: rgba(208,40,42,0.1);
    }
  </style>
</head>

<body>

  <div class="container-xl">

    <!-- HEADER -->
    <div class="page-header">
      <div class="page-title">Clubes</div>
      <div class="page-subtitle">Listado de clubes registrados en la liga</div>
    </div>

    <!-- TABLA -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Siglas</th>
            <th>Nombre</th>
            <th>Localidad</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for club in clubes_list %}
          <tr>
            <td>{{ club.nombre_siglas }}</td>
            <td class="club-name">{{ club.nombre_completo }}</td>
            <td>{{ club.localidad }}</td>
            <td>
              <a href="{% url 'club_detalle' club.id %}" class="btn btn-sm btn-outline-light">
                Ver detalle
              </a>
            </td>            
          </tr>
          {% empty %}
          <tr>
            <td colspan="7">No hay clubes registrados.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <!-- BOTÓN VOLVER -->
    <div class="text-center">
      <a href="{% url 'home' %}" class="back-btn">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>
    </div>

  </div>

</body>
</html>
