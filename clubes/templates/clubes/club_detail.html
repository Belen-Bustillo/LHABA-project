{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>{{ club.nombre_corto }} - LHABA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --lhaba-red: #D0282A;
      --bg-dark: #0D0D0F;
      --bg-card: #161618;
      --border-subtle: rgba(255,255,255,0.07);
    }

    body {
      background-color: var(--bg-dark);
      font-family: 'Barlow', sans-serif;
      color: #E0E0E0;
      margin: 0;
    }

    .page-header {
      padding: 3rem 0 2rem;
      text-align: center;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 2.5rem;
      text-transform: uppercase;
      color: #fff;
    }

    .card-detail {
      max-width: 700px;
      margin: 0 auto;
      background-color: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 2rem;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .detail-label {
      font-size: 0.8rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-value {
      font-weight: 600;
      color: #fff;
      text-align: right;
    }

    .back-btn {
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      color: #ccc;
      text-decoration: none;
      border: 1px solid var(--border-subtle);
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #fff;
      border-color: var(--lhaba-red);
      background-color: rgba(208,40,42,0.1);
    }
  </style>
</head>

<body>

<div class="container-xl">

  <div class="page-header">
    <div class="page-title">{{ club.nombre_completo }}</div>
  </div>

  <div class="card-detail">

    <div class="detail-row">
      <div class="detail-label">Siglas</div>
      <div class="detail-value">{{ club.nombre_siglas }}</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Nombre corto</div>
      <div class="detail-value">{{ club.nombre_corto }}</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Localidad</div>
      <div class="detail-value">{{ club.localidad }}</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Email</div>
      <div class="detail-value">{{ club.email }}</div>
    </div>

    <div class="detail-row">
      <div class="detail-label">Fecha ingreso a la Liga</div>
      <div class="detail-value">{{ club.fecha_ingreso }}</div>
    </div>

  </div>

  <div class="text-center">
    <a href="{% url 'clubes_list' %}" class="back-btn">
      <i class="bi bi-arrow-left"></i> Volver a clubes
    </a>
  </div>

</div>

</body>
</html>
