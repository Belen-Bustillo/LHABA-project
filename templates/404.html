{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>404 - Página no encontrada</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --lhaba-red: #D0282A;
      --lhaba-red-dark: #A01E20;
      --bg-dark: #0D0D0F;
      --bg-card: #161618;
      --border-subtle: rgba(255,255,255,0.07);
    }

    body {
      background-color: var(--bg-dark);
      font-family: 'Barlow', sans-serif;
      color: #E0E0E0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .error-container {
      max-width: 500px;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 6rem;
      color: var(--lhaba-red);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .error-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .error-text {
      color: #777;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.7rem 1.6rem;
      border-radius: 4px;
      background-color: var(--lhaba-red);
      color: #fff;
      text-decoration: none;
      border: 2px solid var(--lhaba-red);
      transition: all 0.2s ease;
    }

    .btn-home:hover {
      background-color: var(--lhaba-red-dark);
      border-color: var(--lhaba-red-dark);
      color: #fff;
      transform: translateY(-2px);
    }

    .error-icon {
      font-size: 2rem;
      color: var(--lhaba-red);
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

  <div class="error-container">
    
    <div class="error-icon">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>

    <div class="error-code">404</div>

    <div class="error-title">
      Página no encontrada
    </div>

    <div class="error-text">
      La página que estás buscando no existe o fue movida.
    </div>

    <a href="{% url 'home' %}" class="btn-home">
      <i class="bi bi-arrow-left"></i> Volver al inicio
    </a>

  </div>

</body>
</html>
